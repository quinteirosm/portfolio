# Client & Work
client_and_work:
 title: "Portfolio"
 enable: true
 works:
  - title: "Mobile Application for VenoCert: Biometric & NFC Authentication"
    description: "
    In collaboration with Global ID SA (EPFL Innovation Park), I designed and developed a hybrid mobile application and its dedicated API for the VenoCert service. 
    This cybersecurity project focuses on high-security document authentication using biometric finger-vein scans, NFC tags, and QR codes. <br><br>
    <b>Technical Stack:</b> Developed the mobile client with Ionic, Angular, and TypeScript, and the backend using Node.js, Express, and Prisma ORM. The infrastructure includes Nginx and Docker for deployment, with full API documentation via Swagger. <br><br>
    <b>Key Deliverables:</b> Managed the complete lifecycle from a functional MVP to a polished prototype ready for demonstrations. <br><br><i>Note on Confidentiality: Due to the sensitive nature of the technology, specific technical details are under a non-disclosure agreement.</i>"
    buttons:
     - icon: "icon-arrow-right"
       btnText: "Explore the project on the HEIG-VD Portal"
       URL: "http://www.tb.heig-vd.ch/8431"
    image:
      x: "img/works/globalid.jpg"
      _2x: "img/works/globalid.jpg"
    is_even: true

  - title: "DogWalk API & App"
    description: "
    During our 3rd year, for the web architecture and mobile development courses, we were able to carry out a joint project.<br>
    The project consisted of an API and an application based on it, the aim of which was to enable dog walkers to stop walking their dogs on their own.<br><br>
    We've used Node.js, Express.js, MongoDB, Ionic, Android SDK and Swagger for the documentation.<br> "
    buttons:
     - icon: "icon-arrow-right"
       btnText: "API's documentation"
       URL: "https://dogwalkapi.onrender.com/api-docs/"
     - icon: "icon-arrow-right"
       btnText: "API's repository"
       URL: "https://github.com/Tupidix/DogWalkAPI"
     - icon: "icon-arrow-right"
       btnText: "App's repository"
       URL: "https://github.com/Tupidix/DogWalkAPP"
    image:
      x: "img/works/DogWalk.png"
      _2x: "img/works/DogWalk.png"
    is_even: true

  - title: "LabVeilTec - SSG Website"
    description: "
    For the technology watch course, we had to research and write various articles on technology watch and how to apply it to ourselves.<br> 
    The only condition was that we had to submit the articles in the form of a site generated with an SSG.<br> 
    It was during this project that I discovered Hugo.<br>"
    buttons:
     - icon: "icon-arrow-right"
       btnText: "Website"
       URL: "https://quinteirosm.github.io/LabVeilTec/"
    image:
      x: "img/works/LabVeilTec.png"
      _2x: "img/works/LabVeilTec.png"
    is_even: true

  - title: "Couleur3 - WebApp"
    description: "
    During the RTS Hackdays, I worked with a team to renovate the webapp for the radio Couleur3.<br> 
    The goal was to increase interactivity and to make it more user friendly. We won the third prize for the best project.<br><br> 
    During this project, I was in charge of project management and fullstack development.<br>"
    buttons:
     - icon: "icon-arrow-right"
       btnText: "Github repository"
       URL: "https://github.com/loicfontaine/FlopV2"
     - icon: "icon-arrow-right"
       btnText: "Report"
       URL: "documents/Couleur3.pdf"
    image:
     x: "img/works/Couleur3.png"
     _2x: "img/works/Couleur3.png"
    is_even: true
  
  - title: "SleepCompare - Datavisualisation website"
    description: "
    SleepCompare is a website that compares the sleep between two persons, one of them having a sleep disorder.<br> 
    It was made for a school project during our second year for the D3.js course.<br><br> 
    During this project, I was in charge of data treatment and helped on the front-end.<br>"
    buttons:
